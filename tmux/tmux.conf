# Tags

set-option -g base-index 1

set-option -sg command-alias[4] view='
	if-shell "tmux has-session -t:#{@tag}" {
		run-shell -C "select-window -t:#{@tag}"
	} {
		run-shell -C "new-window -t:#{@tag}"
	}'

set-option -sg command-alias[5] tag='
	if-shell "tmux has-session -t:#{@tag}" {
		run-shell -C "join-pane -t:#{@tag}"
	} {
		run-shell -C "break-pane -t:#{@tag}"
	}
	run-shell -C "select-layout #{@layout}"
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"'

set-option -sg command-alias[6] shiftview='
	set-option -F @tag "#{e|#{@inc}|:#{window_index},1}"
	if-shell -F "#{&&:#{e|>|:#{@tag},0},#{e|<|:#{@tag},10}}" {
		if-shell "tmux has-session -t:#{@tag}" {
			run-shell -C "select-window -t:#{@tag}"
		} {
			run-shell -C "new-window -t:#{@tag}"
	} }'

set-option -sg command-alias[7] shifttag='
	set-option -F @tag "#{e|#{@inc}|:#{window_index},1}"
	if-shell -F "#{&&:#{e|>|:#{@tag},0},#{e|<|:#{@tag},10}}" {
		if-shell "tmux has-session -t:#{@tag}" {
			run-shell -C "join-pane -t:#{@tag}"
		} {
			run-shell -C "break-pane -t:#{@tag}"
	} }
	run-shell -C "select-layout #{@layout}"
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"'

set-option -sg command-alias[8] viewzero='
	choose-tree -wZ'

set-option -sg command-alias[9] togglebar='
	set-option -F status "#{?#{==:#{status},off},2,off}"'

# Layouts

if-shell -F "#{?@mfact,,1}" { set-option -g @mfact 50 }

if-shell -F "#{?@layout,,1}" { set-option -g @layout main-vertical }

if-shell -F "#{?@layout-symbol,,1}" { set-option -g @layout-symbol "[]=" }

set-option -sg command-alias[10] setmfact='
	if-shell -F "{e|#{?#{==:#{@inc},+},>,<}|:#{@mfact},#{?#{==:#{@inc},+},5,95}}" {
		set-option -F @mfact "#{e|#{@inc}|:#{@mfact},5}"
	}
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"'

set-option -sg command-alias[11] resizemouse='
	resize-pane -M'

set-option -sg command-alias[12] setlayout-tile='
