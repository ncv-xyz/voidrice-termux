# Buttons

set-option -g mouse on

bind-key -n S-MouseDown2StatusLeft \
	set-option @args "nvim ~/.config/tmux/tmux.conf" \; \
	terminal

bind-key -n MouseDown1Pane movemouse
bind-key MouseDown2Pane resizemouse
bind-key MouseDown3Pane defaultgaps

bind-key WheelUpPane set-option @inc "+" \; incrgaps
bind-key WheelDownPane set-option @inc "-" \; incrgaps

bind-key -n MouseDown1Status set-option @tag "=" \; view
bind-key MouseDown1Status set-option @tag "=" \; tag

bind-key -n WheelUpStatus set-option @inc "-" \; shiftview
bind-key -n WheelDownStatus set-option @inc "+" \; shiftview

bind-key -n MouseDown1StatusRight \
	set-option @args \
	"zathura ~/.local/share/larbs/readme.pdf" \; \
	terminal

bind-key -n MouseDown2StatusRight \
	set-option @args 'notify-send \
	"❓ Help module" \
	"Left click to open LARBS guide."' \; \
	spawn

bind-key -n MouseDown3StatusRight \
	source-file -q ~/.config/tmux/tmux.conf

bind-key -n MouseDown3Pane \
	select-pane -t = \; \
	if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
		send-keys -M
	} {
		pasteb -p
	}

bind-key -n MouseDrag1Pane \
	if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" {
		send-keys -M
	} {
		copy-mode -M
	}

bind-key -n DoubleClick1Pane select-pane -t = \; \
	if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" {
		send-keys -M
	} {
		copy-mode -M
		send-keys -X select-word
	}

bind-key -n TripleClick1Pane select-pane -t = \; \
	if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" {
		send-keys -M
	} {
		copy-mode -M
		send-keys -X select-word
	}

bind-key -n WheelUpPane \
	if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" {
		send-keys -M
	} {
		copy-mode -e
	}

bind-key -T copy-mode-vi MouseDown1Pane select-pane

bind-key -T copy-mode-vi MouseUp1Pane send-keys -X copy-mode

bind-key -T copy-mode-vi MouseDrag1Pane select-pane \; \
	send-keys -X begin-selection

bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; \
	send-keys -X select-word

bind-key -T copy-mode-vi TripleClick1Pane select-pane \; \
	send-keys -X select-word

bind-key -T copy-mode-vi WheelUpPane select-pane \; \
	send-keys -X scroll-up

bind-key -T copy-mode-vi WheelDownPane select-pane \; \
	send-keys -X scroll-down
