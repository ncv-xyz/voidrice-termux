set-hook -g after-select-layout {
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"
}

set-hook -g after-select-window {
	run-shell -C "select-layout #{@layout}"
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"
}

set-hook -g pane-exited {
	run-shell -C "select-layout #{@layout}"
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"
}

set-hook -g after-kill-pane {
	run-shell -C "select-layout #{@layout}"
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"
}

set-hook -ag after-split-window {
	run-shell -C "select-layout #{@layout}"
	run-shell -C "resize-pane -t:.0 -x #{@mfact}% -y #{@mfact}%"
}

# Stack

set-option -sg command-alias[23] zoom='
	swap-pane -s :. -t:.0
	select-pane -t:.0'

set-option -sg command-alias[24] togglefullscr='
	set-option -F status "#{?#{==:#{status},off},2,off}"
	resize-pane -Z'

#set-option -sg command-alias[25] togglesticky=''

#set-option -sg command-alias[26] togglefloating=''

set-option -sg command-alias[27] spawn='
	run-shell "#{@args} >/dev/null 2>&1 || true"'

set-option -sg command-alias[28] terminal='
	if-shell -F "#{==:#{==:#{pane_current_command},#{b:SHELL}},#{?@args,1}}" {
		run-shell -C "respawn-pane -k -c \"#{pane_current_path}\" \"#{@args}\""
		set-option -p remain-on-exit on
		set-hook -p pane-died {
			run-shell -C "respawn-pane -c \"#{pane_start_path}\" \"#{b:SHELL} -l\""
			set-option -pu remain-on-exit
			set-hook -pu pane-died
		}
	} {
		run-shell -C "split-window -t:.0 #{?@args,\"#{@args}\"}"
		swap-pane -s:.0 -t:.1
	}'

set-option -sg command-alias[29] togglescratch='
	if-shell -F "#{@ui}" {
		set-option -F @w "#{?#{e|>|:#{window_width},50},-w 50}"
		set-option -F @h "#{?#{e|>|:#{window_height},20},-h 20}"
		run-shell -C "display-popup #{@w} #{@h} -E \"bc -lq\""
	} {
		set-option -F @w "#{?#{e|>|:#{window_width},120},-w 120}"
		set-option -F @h "#{?#{e|>|:#{window_height},34},-h 34}"
		run-shell -C "display-popup #{@w} #{@h} -E"
	}'

set-option -sg command-alias[30] killclient='
