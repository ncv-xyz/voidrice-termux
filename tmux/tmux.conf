# tmux-dwm

set-option -g alternate-screen on
set-option -g focus-events on
set-option -g scroll-on-clear on
set-option -g history-limit 30000
set-option -g word-separators " "
set-option -sg set-clipboard external
set-option -sg default-terminal "tmux-256color"

run-shell 'tmux set-environment -g PATH "$(find "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/scripts" -type d | paste -sd ":" -):$PATH"'
run-shell 'tmux set-option -g @hostname "$(cat /etc/hostname)"'

