## dunst

set-option -g @dunstrc "~/.config/dunst/dunstrc"

if-shell "[ -f #{@dunstrc} ]" {
	run-shell 'dunstrc_low="$(cat #{@dunstrc})"; \
	dunstrc_low="${dunstrc_low#*_low]}"; \
	dunstrc_low="${dunstrc_low%%\[*}"; \
	dunstrc_normal="$(cat #{@dunstrc})"; \
	dunstrc_normal="${dunstrc_normal#*_normal]}"; \
	dunstrc_normal="${dunstrc_normal%%\[*}"; \
	dunstrc_critical="$(cat #{@dunstrc})"; \
	dunstrc_critical="${dunstrc_critical#*_critical]}"; \
	dunstrc_critical="${dunstrc_critical%%\[*}"; \
	low_foreground="${dunstrc_low#*foreground = \"}"; \
	low_foreground="${low_foreground%%\"*}"; \
	low_background="${dunstrc_low#*background = \"}"; \
	low_background="${low_background%%\"*}"; \
	low_timeout="${dunstrc_low#*timeout = }"; \
	low_timeout=$(( low_timeout * 1000 )); \
	normal_foreground="${dunstrc_normal#*foreground = \"}"; \
	normal_foreground="${normal_foreground%%\"*}"; \
	normal_background="${dunstrc_normal#*background = \"}"; \
	normal_background="${normal_background%%\"*}"; \
	normal_timeout="${dunstrc_normal#*timeout = }"; \
	normal_timeout=$(( normal_timeout * 1000 )); \
	critical_foreground="${dunstrc_critical#*foreground = \"}"; \
	critical_foreground="${critical_foreground%%\"*}"; \
	critical_background="${dunstrc_critical#*background = \"}"; \
	critical_background="${critical_background%%\"*}"; \
	critical_timeout="${dunstrc_critical#*timeout = }"; \
	critical_timeout=$(( critical_timeout * 1000 )); \
	tmux \
	set-option -g @dunstlowcolor "bg=$low_background fg=$low_foreground" \; \
	set-option -g @dunstlowtimeout "$low_timeout" \; \
	set-option -g @dunstnormalcolor "bg=$normal_background fg=$normal_foreground" \; \
	set-option -g @dunstnormaltimeout "$normal_timeout" \; \
	set-option -g @dunstcriticalcolor "bg=$critical_background fg=$critical_foreground" \; \
	set-option -g @dunstcriticaltimeout "$critical_timeout" \; \
	set-option -g @dunstbgcolor "$normal_background" \; \
	set-option -g @dunstfgcolor "$normal_foreground" \; \
	set-option -Fg @dunst "##{@dunstnormalcolor}" \; \
	set-option -Fg display-time "##{@dunstcriticaltimeout}"'
}

## wal

set-option -g @waldwm "~/.cache/wal/colors-wal-dwm.h"

if-shell "command -v wal && [ -f #{@waldwm} ]" {
	run-shell 'norm_fg="$(grep -m 1 norm_fg #{@waldwm})" ; \
	norm_fg="${norm_fg#*\"}" ; \
	norm_fg="${norm_fg%\"*}" ; \
	norm_bg="$(grep -m 1 norm_bg #{@waldwm})" ; \
	norm_bg="${norm_bg#*\"}" ; \
	norm_bg="${norm_bg%\"*}" ; \
	norm_border="$(grep -m 1 norm_border #{@waldwm})" ; \
	norm_border="${norm_border#*\"}" ; \
	norm_border="${norm_border%\"*}" ; \
	sel_fg="$(grep -m 1 sel_fg #{@waldwm})" ; \
	sel_fg="${sel_fg#*\"}" ; \
	sel_fg="${sel_fg%\"*}" ; \
	sel_bg="$(grep -m 1 sel_bg #{@waldwm})" ; \
	sel_bg="${sel_bg#*\"}" ; \
	sel_bg="${sel_bg%\"*}" ; \
	sel_border="$(grep -m 1 sel_border #{@waldwm})" ; \
	sel_border="${sel_border#*\"}" ; \
	sel_border="${sel_border%\"*}" ; \
	tmux \
	set-option -g @normfgcolor "$norm_fg" \; \
	set-option -g @normbgcolor "$norm_bg" \; \
	set-option -g @normbordercolor "$norm_border" \; \
	set-option -g @selfgcolor "$sel_fg" \; \
	set-option -g @selbgcolor "$sel_bg" \; \
	set-option -g @selbordercolor "$sel_border"'
}

# Terminal

